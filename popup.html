<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }
    .header img {
      width: 28px;
      height: 28px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #16213e;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 14px;
    }
    .toggle-row span {
      font-size: 13px;
    }
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #444;
      border-radius: 22px;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .switch input:checked + .slider {
      background: #e94560;
    }
    .switch input:checked + .slider::before {
      transform: translateX(18px);
    }
    .stats {
      background: #16213e;
      padding: 12px 14px;
      border-radius: 8px;
    }
    .stats h2 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 8px;
    }
    .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: #e94560;
    }
    .stat-label {
      font-size: 12px;
      color: #999;
      margin-top: 2px;
    }
    .rating {
      display: none;
      background: #16213e;
      padding: 12px 14px;
      border-radius: 8px;
      margin-top: 14px;
    }
    .rating.visible {
      display: block;
    }
    .rating p {
      font-size: 13px;
      line-height: 1.4;
      margin-bottom: 10px;
    }
    .rating-actions {
      display: flex;
      gap: 6px;
    }
    .rating-actions button {
      flex: 1;
      font: inherit;
      font-size: 12px;
      padding: 7px 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #2a3a5e;
      color: #e0e0e0;
      transition: background 0.15s;
    }
    .rating-actions button:hover {
      background: #354a73;
    }
    .rating-actions button.primary {
      background: #e94560;
      color: #fff;
    }
    .rating-actions button.primary:hover {
      background: #f25670;
    }
</style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="Cookie Refuser">
    <h1>Cookie Refuser</h1>
  </div>

  <div class="toggle-row">
    <span>Auto-deny cookies</span>
    <label class="switch" aria-label="Auto-deny cookies toggle">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="stats">
    <h2>Banners blocked</h2>
    <div class="stat-number" id="total">0</div>
    <div class="stat-label">cookie popups denied</div>
  </div>

  <div class="rating" id="rating" role="region" aria-label="Rate Cookie Refuser">
    <p>Enjoying Cookie Refuser? A quick rating helps others find it.</p>
    <div class="rating-actions">
      <button type="button" class="primary" id="rating-rate">Rate it</button>
      <button type="button" id="rating-later">Later</button>
      <button type="button" id="rating-dismiss">No thanks</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
